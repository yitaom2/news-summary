name: Daily AI Digest

on:
  schedule:
    - cron: '0 13 * * *'  # 8:00 AM EST (UTC-5)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Fetch news and generate digest
        run: npm run fetch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Copy digest to docs/index.md
        run: |
          TODAY=$(TZ="America/New_York" date +%Y-%m-%d)
          mkdir -p docs
          SRC="output/${TODAY}.md"
          [ -f "$SRC" ] || SRC="$(ls output/*.md | sort | tail -1)"
          printf -- "---\nlayout: default\n---\n\n" | cat - "$SRC" > docs/index.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md
          git diff --staged --quiet || git commit -m "digest: $(TZ='America/New_York' date +%Y-%m-%d)"
          git push
